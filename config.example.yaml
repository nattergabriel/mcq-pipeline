output_dir: "data/output"

extraction:
  input_pdfs_dir: "data/input/pdfs"
  chunk_size: 2000
  chunk_overlap: 200

generation:
  experiments:
    - name: "setup1"
      mode: "single_step"
      prompt_file: "prompts/generation/single_step_baseline.txt"
      model: "mistral-small-3.2-24b"
      temperature: 0.75
      num_questions_per_chunk: 1

    - name: "setup2"
      mode: "two_step"
      question_prompt_file: "prompts/generation/two_step_question.txt"
      distractor_prompt_file: "prompts/generation/two_step_distractors.txt"
      model: "glm-4.6-355b"
      temperature: 0.9
      num_questions_per_chunk: 1

evaluation:
  prompt_file: "prompts/evaluation/baseline.txt"
  model: "mistral-small-3.2-24b"
  temperature: 0.3

export:
  min_weighted_avg_score: 1.5
  criteria_weights:
    clarity: 1.0
    correctness: 1.0
    distractor_quality: 1.0
    relevance: 1.0