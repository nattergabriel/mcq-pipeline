output_dir: "data/output"

extraction:
  input_pdfs_dir: "data/input/pdfs"

generation:
  experiments:
    - name: "setup1"
      prompt_file: "prompts/generation/baseline.txt"
      model: "mistral-small-3.2-24b"
      temperature: 0.75
      num_questions: 1
      pages_per_chunk: 13
      chunk_overlap: 1

evaluation:
  prompt_file: "prompts/evaluation/baseline.txt"
  model: "mistral-small-3.2-24b"
  temperature: 0.3
  criteria_weights:
    clarity: 1.0
    correctness: 1.0
    distractor_quality: 1.0